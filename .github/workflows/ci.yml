# .github/workflows/ci.yml
name: CI (Web + Typecheck + Test)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VITE_TMDB_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx vitest run
      - name: Build
        run: npm run build
